<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SVG to PNG Converter</title>
  </head>
  <body>
    <canvas id="canvas" width="81" height="81" style="display: none"></canvas>
    <img id="preview" style="border: 1px solid #ccc; margin: 20px" />
    <a id="download" download="logo-web.png" style="display: block; margin: 20px">下载 PNG</a>

    <script>
      const svgContent = `<svg width="81" height="81" viewBox="0 0 81 81" fill="none" xmlns="http://www.w3.org/2000/svg">
  <circle cx="40.5" cy="40.5" r="40.5" fill="#165DFF"/>
  <g transform="translate(40.5, 28)">
    <circle cx="0" cy="0" r="5" fill="white"/>
    <path d="M -6 8 Q -6 5 -4 5 L 4 5 Q 6 5 6 8 L 6 16 Q 6 18 4 18 L -4 18 Q -6 18 -6 16 Z" fill="white"/>
  </g>
  <g transform="translate(22, 38)">
    <circle cx="0" cy="0" r="4" fill="white" opacity="0.7"/>
    <path d="M -5 6 Q -5 4 -3 4 L 3 4 Q 5 4 5 6 L 5 12 Q 5 14 3 14 L -3 14 Q -5 14 -5 12 Z" fill="white" opacity="0.7"/>
  </g>
  <g transform="translate(59, 38)">
    <circle cx="0" cy="0" r="4" fill="white" opacity="0.7"/>
    <path d="M -5 6 Q -5 4 -3 4 L 3 4 Q 5 4 5 6 L 5 12 Q 5 14 3 14 L -3 14 Q -5 14 -5 12 Z" fill="white" opacity="0.7"/>
  </g>
  <line x1="40.5" y1="44" x2="22" y2="44" stroke="white" stroke-width="2" opacity="0.5"/>
  <line x1="40.5" y1="44" x2="59" y2="44" stroke="white" stroke-width="2" opacity="0.5"/>
  <path d="M 20 60 Q 40.5 65 61 60" stroke="white" stroke-width="2" fill="none" opacity="0.3"/>
</svg>`

      const canvas = document.getElementById('canvas')
      const ctx = canvas.getContext('2d')
      const preview = document.getElementById('preview')
      const download = document.getElementById('download')

      const img = new Image()
      const svgBlob = new Blob([svgContent], { type: 'image/svg+xml;charset=utf-8' })
      const url = URL.createObjectURL(svgBlob)

      img.onload = function () {
        ctx.drawImage(img, 0, 0, 81, 81)
        const pngUrl = canvas.toDataURL('image/png')
        preview.src = pngUrl
        download.href = pngUrl
        URL.revokeObjectURL(url)
      }

      img.src = url
    </script>
  </body>
</html>
