<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>项目已迁移 · 人力资源管理系统</title>
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
        margin: 0;
        padding: 0;
      }
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, 'Helvetica Neue', 'PingFang SC', 'Hiragino Sans GB',
          'Microsoft YaHei', Arial, sans-serif;
        color: #303133;
        background: linear-gradient(135deg, #f5f7fa 0%, #e8ecf3 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      .card {
        width: 100%;
        max-width: 520px;
        background: #ffffff;
        border-radius: 16px;
        padding: 48px 40px 40px;
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.08);
        text-align: center;
        animation: fadeIn 0.5s ease-out;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(12px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .icon-wrap {
        width: 72px;
        height: 72px;
        margin: 0 auto 24px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .icon-wrap svg {
        width: 64px;
        height: 64px;
        fill: #181717;
      }
      h1 {
        margin: 0 0 12px;
        font-size: 22px;
        font-weight: 600;
        color: #1f2937;
      }
      .desc {
        margin: 0 0 32px;
        font-size: 15px;
        line-height: 1.6;
        color: #606266;
      }
      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        min-width: 200px;
        padding: 12px 28px;
        font-size: 15px;
        font-weight: 500;
        color: #ffffff;
        background: linear-gradient(135deg, #409eff 0%, #2570e0 100%);
        border: none;
        border-radius: 8px;
        text-decoration: none;
        cursor: pointer;
        transition:
          transform 0.15s ease,
          box-shadow 0.15s ease,
          opacity 0.15s ease;
        box-shadow: 0 4px 12px rgba(64, 158, 255, 0.3);
      }
      .btn:hover {
        transform: translateY(-1px);
        box-shadow: 0 6px 16px rgba(64, 158, 255, 0.4);
      }
      .btn:active {
        transform: translateY(0);
        opacity: 0.9;
      }
      .btn svg {
        width: 16px;
        height: 16px;
        fill: currentColor;
      }
      .link-box {
        margin-top: 24px;
        padding: 12px 16px;
        background: #f5f7fa;
        border: 1px solid #e4e7ed;
        border-radius: 8px;
        font-size: 13px;
        color: #606266;
        word-break: break-all;
        text-align: left;
      }
      .link-box .label {
        display: block;
        font-size: 12px;
        color: #909399;
        margin-bottom: 4px;
      }
      .link-box a {
        color: #409eff;
        text-decoration: none;
      }
      .link-box a:hover {
        text-decoration: underline;
      }
      @media (max-width: 480px) {
        .card {
          padding: 36px 24px 28px;
        }
        h1 {
          font-size: 20px;
        }
        .desc {
          font-size: 14px;
        }
      }
    </style>
  </head>
  <body>
    <main class="card" role="main">
      <div class="icon-wrap" aria-hidden="true">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path
            d="M12 .297C5.373.297 0 5.67 0 12.297c0 5.302 3.438 9.8 8.205 11.387.6.111.82-.26.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.84 1.237 1.84 1.237 1.07 1.834 2.807 1.304 3.492.997.108-.776.418-1.305.762-1.605-2.665-.305-5.467-1.334-5.467-5.93 0-1.31.467-2.382 1.235-3.222-.123-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.3 1.23a11.49 11.49 0 0 1 3.003-.404c1.018.005 2.043.138 3.003.404 2.29-1.552 3.297-1.23 3.297-1.23.654 1.652.243 2.873.12 3.176.77.84 1.233 1.912 1.233 3.222 0 4.61-2.807 5.62-5.48 5.918.43.372.815 1.103.815 2.222 0 1.604-.014 2.898-.014 3.293 0 .32.216.694.825.576C20.565 22.092 24 17.594 24 12.297 24 5.67 18.627.297 12 .297"
          />
        </svg>
      </div>
      <h1>项目已迁移</h1>
      <p class="desc">该项目已迁移至 GitHub，请点击下方按钮跳转预览</p>
      <a class="btn" href="https://chenjianwei98.github.io/hr-system/" target="_blank" rel="noopener">
        <span>前往新地址预览</span>
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path
            d="M14 3v2h3.59l-9.83 9.83 1.41 1.41L19 6.41V10h2V3h-7zM19 19H5V5h7V3H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2v-7h-2v7z"
          />
        </svg>
      </a>
      <div class="link-box">
        <span class="label">新地址</span>
        <a href="https://chenjianwei98.github.io/hr-system/" target="_blank" rel="noopener"
          >https://chenjianwei98.github.io/hr-system/</a
        >
      </div>
    </main>
  </body>
</html>
